name: Beta Release (Marketplace Pre-Release)

# Publishes a pre-release to the VS Code Marketplace on every push to `beta`.
# VS Code Marketplace does NOT support SemVer pre-release identifiers (-beta.N).
# Use odd MINOR versions for pre-release (1.1.x) and even MINOR for stable (1.2.x).
# The --pre-release flag is what marks the build as pre-release in the Marketplace.
# Users with the stable extension do NOT get this automatically — they must
# explicitly click "Switch to Pre-Release Version" in the Extensions panel.

on:
  push:
    branches:
      - beta
  workflow_dispatch:

concurrency:
  group: beta-release
  cancel-in-progress: true

jobs:
  beta:
    name: Build & Publish Pre-Release to Marketplace
    runs-on: ubuntu-latest

    permissions:
      contents: write   # create GitHub pre-release & upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache VS Code test binary
        uses: actions/cache@v4
        with:
          path: ~/.vscode-test
          key: vscode-test-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: vscode-test-${{ runner.os }}-

      - name: Quality gates
        run: |
          npx tsc --noEmit -p .
          npm run lint
          npm run compile-tests
          xvfb-run -a npm test

      - name: Security audit (production deps)
        run: npm audit --audit-level=high --omit=dev

      - name: Read version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Validate pre-release version (odd MINOR required)
        run: |
          MINOR=$(node -p "require('./package.json').version.split('.')[1]")
          if [ $((MINOR % 2)) -eq 0 ]; then
            echo "::error::Pre-release versions must have an odd MINOR (e.g. 1.1.x). Got MINOR=$MINOR. Use even MINOR (e.g. 1.2.x) only for stable releases."
            exit 1
          fi
          echo "OK: version ${{ steps.ver.outputs.version }} has odd MINOR=$MINOR"

      - name: Build extension (production webpack)
        run: npm run package

      - name: Convert SVG icon to PNG (128x128)
        run: |
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 128 -h 128 resources/icon.svg -o resources/icon.png

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package pre-release .vsix
        run: vsce package --pre-release --out kubectl-control-${{ steps.ver.outputs.version }}.vsix

      - name: Publish pre-release to VS Code Marketplace
        run: vsce publish --pre-release --packagePath kubectl-control-${{ steps.ver.outputs.version }}.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create / update GitHub Pre-Release (for traceability)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Beta v${{ steps.ver.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: kubectl-control-${{ steps.ver.outputs.version }}.vsix
          body: |
            Dieser Build ist auch im **VS Code Marketplace** als Pre-Release verfügbar.
            In VS Code: Extension-Seite öffnen → **„Switch to Pre-Release Version"**

            Nutzer der Stable-Version werden **nicht automatisch** aktualisiert.
