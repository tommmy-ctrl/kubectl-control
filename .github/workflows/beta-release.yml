name: Beta Release (Pre-Release .vsix)

# Builds a pre-release .vsix on every push to the `beta` branch and publishes it
# as a GitHub *pre-release*. It is NOT published to the Marketplace, so users who
# sideload the .vsix do NOT get automatic updates.

on:
  push:
    branches:
      - beta
  workflow_dispatch:

concurrency:
  group: beta-release
  cancel-in-progress: true

jobs:
  beta:
    name: Build & Publish Beta .vsix
    runs-on: ubuntu-latest

    permissions:
      contents: write   # create pre-release & upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Quality gates
        run: |
          npx tsc --noEmit -p .
          npm run lint
          npm run compile-tests
          xvfb-run -a npm test

      - name: Security audit (production deps)
        run: npm audit --audit-level=high --omit=dev

      - name: Read version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Fail if version is not a -beta version
        run: |
          case "${{ steps.ver.outputs.version }}" in
            *-beta*) echo "OK: ${{ steps.ver.outputs.version }}" ;;
            *) echo "::error::package.json version '${{ steps.ver.outputs.version }}' must contain '-beta' on the beta branch"; exit 1 ;;
          esac

      - name: Build extension (production webpack)
        run: npm run package

      - name: Convert SVG icon to PNG (128x128)
        run: |
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 128 -h 128 resources/icon.svg -o resources/icon.png

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package pre-release .vsix
        run: vsce package --pre-release --out kubectl-control-${{ steps.ver.outputs.version }}.vsix

      - name: Create / update GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Beta v${{ steps.ver.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: kubectl-control-${{ steps.ver.outputs.version }}.vsix
          body: |
            ⚠️ **Beta / Pre-Release.** Manuell installieren:
            `code --install-extension kubectl-control-${{ steps.ver.outputs.version }}.vsix`
            oder in VS Code: Extensions ▸ „…" ▸ *Install from VSIX…*

            Sideloads aus einer `.vsix` werden von VS Code **nicht automatisch aktualisiert**.
